<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora ROI — Wiongo Robotics</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Montserrat',Arial,sans-serif;background:#0B1A2A;color:#fff;min-height:100vh}
:root{--navy:#0B1A2A;--navyL:#112236;--navyM:#16304F;--cyan:#00AEEF;--cyanD:#0090C8;--cyanA:rgba(0,174,239,0.12);--cyanA2:rgba(0,174,239,0.22);--green:#22C55E;--orange:#F59E0B;--red:#EF4444;--muted:rgba(255,255,255,0.45);--faint:rgba(255,255,255,0.07)}

/* HEADER */
.hdr{background:linear-gradient(135deg,var(--navyL),#0d2035);border-bottom:2px solid var(--cyan);padding:16px 28px;display:flex;align-items:center;justify-content:space-between}
.hdr-logo{height:46px;object-fit:contain}
.hdr-center{text-align:center}
.hdr-title{font-size:17px;font-weight:800}
.hdr-title span{color:var(--cyan)}
.hdr-sub{font-size:11px;color:var(--muted)}

/* STEPPER */
.stepper{display:flex;justify-content:center;gap:0;padding:20px 0 8px}
.step-item{display:flex;align-items:center}
.step-line{width:36px;height:2px;background:var(--faint)}
.step-line.done{background:var(--cyan)}
.step-circle{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:12px;border:2px solid rgba(255,255,255,0.15);color:rgba(255,255,255,0.3);transition:all .3s;background:transparent}
.step-circle.active{border-color:var(--cyan);background:var(--cyan);color:var(--navy)}
.step-circle.done{border-color:var(--cyan);background:var(--cyan);color:var(--navy)}
.step-label{font-size:11px;font-weight:500;color:rgba(255,255,255,0.3);margin-left:6px;white-space:nowrap}
.step-label.active,.step-label.done{color:#fff;font-weight:700}

/* CONTAINER */
.container{max-width:880px;margin:0 auto;padding:12px 18px 40px}

/* CARDS */
.card{background:var(--navyL);border:1px solid var(--faint);border-radius:14px;padding:22px 26px;margin-bottom:14px}
.card-cyan{background:rgba(0,174,239,0.08);border:1px solid var(--cyanA2)}
.card-result{background:linear-gradient(135deg,var(--cyanA2),var(--cyanA));border:1px solid var(--cyan)}
.section-label{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--cyan);margin:0 0 16px}
.hint-box{background:rgba(0,174,239,0.06);border:1px solid var(--cyanA);border-radius:8px;padding:10px 14px;margin-bottom:14px;font-size:12px;color:var(--muted);line-height:1.6}
.hint-box strong{color:#fff}

/* GRID */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.span2{grid-column:span 2}
.span3{grid-column:span 3}

/* FORM ELEMENTS */
label.lbl{font-size:11px;color:var(--muted);display:block;margin-bottom:5px}
input[type=text],input[type=email],input[type=tel],input[type=number],select{
  background:var(--navyM);border:1px solid rgba(0,174,239,0.25);border-radius:8px;
  padding:8px 12px;color:#fff;font-size:14px;font-weight:600;width:100%;
  font-family:inherit;outline:none;appearance:none}
input[type=text].big{font-size:17px;font-weight:700;padding:12px 14px}
input[type=range]{width:100%;accent-color:var(--cyan);cursor:pointer}
.range-labels{display:flex;justify-content:space-between;font-size:10px;color:var(--muted);margin-top:2px}

/* BUTTONS */
.btn-p{background:linear-gradient(135deg,var(--cyan),var(--cyanD));border:none;border-radius:10px;padding:14px 24px;color:var(--navy);font-size:14px;font-weight:800;cursor:pointer;width:100%;font-family:inherit;transition:opacity .2s}
.btn-p:hover{opacity:.9}
.btn-p:disabled{opacity:.4;cursor:not-allowed}
.btn-s{background:transparent;border:1px solid var(--faint);border-radius:10px;padding:12px 24px;color:var(--muted);font-size:13px;font-weight:600;cursor:pointer;width:100%;font-family:inherit;transition:opacity .2s}
.btn-s:hover{opacity:.7}
.btn-dark{background:linear-gradient(135deg,#1a3a5c,#0d2035);border:none;border-radius:10px;padding:14px 24px;color:#fff;font-size:14px;font-weight:700;cursor:pointer;width:100%;font-family:inherit}
.btn-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}

/* HOTEL TYPE CARDS */
.hotel-card{background:var(--faint);border:2px solid rgba(255,255,255,0.06);border-radius:12px;padding:14px 16px;cursor:pointer;transition:all .2s}
.hotel-card:hover{border-color:rgba(0,174,239,0.4)}
.hotel-card.selected{background:var(--cyanA2);border-color:var(--cyan)}
.hotel-card-name{font-size:18px;font-weight:800;color:#fff}
.hotel-card.selected .hotel-card-name{color:var(--cyan)}
.hotel-card-guests{font-size:12px;color:var(--muted);margin-bottom:8px}
.hotel-stat{display:flex;justify-content:space-between;font-size:12px;margin-top:4px}
.hotel-stat-v{font-weight:700}

/* DEPT CARDS */
.dept-card{background:var(--faint);border:2px solid rgba(255,255,255,0.06);border-radius:11px;padding:13px 15px;cursor:pointer;transition:all .2s;display:flex;gap:11px;align-items:flex-start}
.dept-card:hover{border-color:rgba(0,174,239,0.3)}
.dept-card.selected{background:var(--cyanA);border-color:var(--cyan)}
.dept-icon{font-size:20px;line-height:1}
.dept-name{font-size:14px;font-weight:700;color:#fff}
.dept-card.selected .dept-name{color:var(--cyan)}
.dept-desc{font-size:11px;color:var(--muted)}
.dept-robots{font-size:11px;color:rgba(0,174,239,0.6);margin-top:2px}
.dept-check{width:18px;height:18px;border-radius:4px;background:transparent;border:2px solid rgba(255,255,255,0.2);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;font-size:10px;color:var(--navy);font-weight:900;transition:all .2s}
.dept-card.selected .dept-check{background:var(--cyan);border-color:var(--cyan)}

/* PHYSICS PREVIEW */
.phys-preview{background:var(--faint);border-radius:8px;padding:12px 16px;margin-top:12px}
.phys-item{text-align:center}
.phys-item .lv{font-size:10px;color:var(--muted);margin-bottom:2px}
.phys-item .vv{font-size:16px;font-weight:700;color:#fff}
.phys-item .vv.cyan{color:var(--cyan)}
.phys-item .vv.green{color:var(--green)}

/* LIVE PREVIEW */
.live-preview{background:linear-gradient(135deg,var(--cyanA2),var(--cyanA));border:1px solid var(--cyan);border-radius:14px;padding:18px 22px;margin-bottom:14px}
.live-item{text-align:center}
.live-item .ll{font-size:11px;color:var(--muted)}
.live-item .lv{font-size:18px;font-weight:800}

/* RESULTS */
.kpi-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:11px;margin-bottom:14px}
.kpi-card{background:var(--faint);border:1px solid rgba(255,255,255,0.07);border-radius:12px;padding:18px;text-align:center}
.kpi-card.hl{background:var(--cyanA2);border-color:var(--cyan)}
.kpi-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:5px}
.kpi-value{font-size:28px;font-weight:800}
.kpi-card.hl .kpi-value{color:var(--cyan)}
.kpi-sub{font-size:11px;color:var(--muted);margin-top:3px}

/* SEMÁFORO */
.semaforo{border-radius:12px;padding:14px 20px;display:flex;align-items:center;gap:14px;margin-bottom:14px;border:1px solid}

/* DEPT RESULT */
.dept-result{background:var(--faint);border-radius:10px;padding:14px 16px;margin-bottom:12px}
.dept-result-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.dept-result-method{font-size:10px;color:rgba(0,174,239,0.65);margin-top:2px}

/* TABLE */
.summary-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--faint);font-size:13px}
.summary-row:last-child{border-bottom:none;padding-top:14px;margin-top:6px;border-top:2px solid var(--cyan)}
.summary-total .vl{font-size:36px;font-weight:800;color:var(--cyan);text-align:center;margin-top:8px}

/* CONSENT */
.consent-row{display:flex;gap:11px;cursor:pointer;margin-top:18px;align-items:flex-start}
.consent-box{width:18px;height:18px;border-radius:4px;background:transparent;border:2px solid rgba(255,255,255,0.25);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;font-size:10px;color:var(--navy);font-weight:900;transition:all .2s}
.consent-box.checked{background:var(--cyan);border-color:var(--cyan)}
.consent-text{font-size:11px;color:var(--muted);line-height:1.5}

.error-msg{color:var(--red);font-size:12px;margin-top:10px}
.disclaimer{font-size:10px;color:rgba(255,255,255,0.2);text-align:center;line-height:1.7;margin-top:8px}

/* CHART */
.chart-wrap{position:relative;height:220px;margin-top:12px}

/* FOOTER NOTE */
.foot-note{font-size:10px;color:rgba(255,255,255,0.2);text-align:center;line-height:1.7;padding:0 20px}

/* PRINT HIDDEN */
@media print{body{background:#fff;color:#000}}
</style>
</head>

// ════════════════════════════════════════════════════════════════
// STATE
// ════════════════════════════════════════════════════════════════
const state = {
  step: 1,
  hotel: { name:'', type:'M', category:'resort', stars:4, occupancy:80 },
  sel: { hk:true, fyb:true, eco:false, fd:false },
  P: {
    hk:  { surface:2500, floors:4, frequency:1, costH:14, days:365 },
    fyb: { covers:400, distance:45, serviceType:'buffet', servicesPerDay:2, costH:15, days:365 },
    eco: { deliveryPoints:8, distance:50, loadsPerDay:6, costH:13, days:300 },
    fd:  { rooms:250, checkinsPerDay:80, distance:40, costH:14, days:365 }
  },
  lead: { name:'', role:'', email:'', phone:'', consent:false },
  chart: null
};

// ════════════════════════════════════════════════════════════════
// DATA
// ════════════════════════════════════════════════════════════════
const RENTING = { S:2430, M:5176, L:7210, XL:10620 };
const ROBOTS  = { S:7,    M:14,   L:19,   XL:27 };
const GUESTS  = { S:'< 500', M:'500–1000', L:'1000–1500', XL:'> 1500' };
const DEPTS = [
  { id:'hk',  label:'Housekeeping', icon:'🧹', desc:'C40 — pasillos y zonas comunes (900 m²/h)', robots:'C30/C40/C55' },
  { id:'fyb', label:'F&B',          icon:'🍽️', desc:'T9/S100 — buffet, desbarace, room service',  robots:'T9, S100, W3' },
  { id:'eco', label:'Economato',    icon:'📦', desc:'S300 — logística interna (300 kg/viaje)',    robots:'S300' },
  { id:'fd',  label:'Front Desk',   icon:'🛎️', desc:'W3 — equipajes integrado con ascensor',     robots:'W3, S100' }
];

// ════════════════════════════════════════════════════════════════
// PHYSICS CALCULATIONS  (from Wiongo technical documents)
// ════════════════════════════════════════════════════════════════
function calcHK(p, occ) {
  const manualH = (p.surface / 275) * p.frequency;
  const elevH   = (p.floors - 1) * (300/3600) * p.frequency;
  const robotH  = (p.surface / 900) * p.frequency + elevH + 0.5;
  const freed   = Math.max(0, manualH - robotH);
  const f = occ/100;
  return { manualH, robotH, freedH:freed,
    currentCost: manualH * p.costH * p.days * f,
    savings:     freed   * p.costH * p.days * f,
    hoursFreed:  Math.round(freed * p.days * f),
    savingsPct:  manualH > 0 ? (freed/manualH)*100 : 0,
    method:'Robot C40: 900 m²/h autónomo vs. manual 275 m²/h (Iberostar 2026)' };
}
function calcFYB(p, occ) {
  const effCovers = p.covers * (occ/100);
  const menaje    = effCovers * 5.8;
  const trSucio   = Math.ceil(menaje / 200);
  const trLimpio  = Math.ceil(menaje / 100);
  const tRobotH   = (trSucio*(2*p.distance/0.3) + trLimpio*(2*p.distance/0.4)) / 3600 * p.servicesPerDay;
  const supH      = 0.5 * p.servicesPerDay;
  const trManual  = Math.ceil(menaje / 50) * 3;
  const tManualH  = trManual * (2*p.distance/1.0) * 1.4 / 3600 * p.servicesPerDay;
  const suit      = {buffet:1.0,mixto:0.82,roomservice:0.88,carta:0.65}[p.serviceType]||1.0;
  const freed     = Math.max(0, (tManualH - supH)) * suit;
  return { manualH:tManualH, robotH:tRobotH+supH, freedH:freed,
    currentCost: tManualH * p.costH * p.days,
    savings:     freed    * p.costH * p.days,
    hoursFreed:  Math.round(freed * p.days),
    savingsPct:  tManualH > 0 ? (freed/tManualH)*100 : 0,
    tripsRobot: trSucio+trLimpio, tripsManual: trManual,
    method:'Viajes robot (0.3–0.4 m/s, 200 uds) vs manual (1.0 m/s, 50 uds) · 5.8 menaje/comensal' };
}
function calcEco(p, occ) {
  const f = occ/100;
  const trManual  = p.deliveryPoints * p.loadsPerDay;
  const tManualH  = trManual * (2*p.distance/0.8) * 1.5 / 3600;
  const trRobot   = Math.ceil(trManual/3);
  const tRobotH   = trRobot  * (2*p.distance/0.5) / 3600 + 0.25;
  const freed     = Math.max(0, tManualH - tRobotH);
  return { manualH:tManualH, robotH:tRobotH, freedH:freed,
    currentCost: tManualH * p.costH * p.days * f,
    savings:     freed    * p.costH * p.days * f,
    hoursFreed:  Math.round(freed * p.days * f),
    savingsPct:  tManualH > 0 ? (freed/tManualH)*100 : 0,
    method:'S300 300 kg/viaje (3 destinos) vs carros manuales 25 kg (1 destino)' };
}
function calcFD(p, occ) {
  const f = occ/100;
  const luggage   = p.checkinsPerDay * f * 1.8;
  const trManual  = Math.ceil(luggage/3);
  const trRobot   = Math.ceil(luggage/8);
  const tManualH  = trManual * (2*p.distance/0.8) * 1.3 / 3600;
  const tRobotH   = trRobot  * (2*p.distance/0.4) / 3600 + 0.25;
  const freed     = Math.max(0, tManualH - tRobotH);
  return { manualH:tManualH, robotH:tRobotH, freedH:freed,
    currentCost: tManualH * p.costH * p.days,
    savings:     freed    * p.costH * p.days,
    hoursFreed:  Math.round(freed * p.days),
    savingsPct:  tManualH > 0 ? (freed/tManualH)*100 : 0,
    method:'W3 equipaje: 8 piezas/viaje vs botones 3 piezas/viaje · 1.8 piezas/check-in' };
}

function computeAll() {
  const occ = state.hotel.occupancy;
  const results = [];
  if(state.sel.hk)  results.push({...calcHK(state.P.hk, occ),   id:'hk',  label:'Housekeeping', icon:'🧹'});
  if(state.sel.fyb) results.push({...calcFYB(state.P.fyb, occ),  id:'fyb', label:'F&B',          icon:'🍽️'});
  if(state.sel.eco) results.push({...calcEco(state.P.eco, occ),  id:'eco', label:'Economato',    icon:'📦'});
  if(state.sel.fd)  results.push({...calcFD(state.P.fd, occ),    id:'fd',  label:'Front Desk',   icon:'🛎️'});
  const totalSavings = results.reduce((s,r)=>s+r.savings,0);
  const totalCost    = results.reduce((s,r)=>s+r.currentCost,0);
  const rentM  = RENTING[state.hotel.type];
  const rentA  = rentM * 12;
  const neto   = totalSavings - rentA;
  const payM   = totalSavings > 0 ? (rentA/totalSavings)*12 : 999;
  const roi3   = rentA > 0 ? ((neto*3)/(rentA*3))*100 : 0;
  const roi5   = rentA > 0 ? ((neto*5)/(rentA*5))*100 : 0;
  return { results, totalSavings, totalCost, rentM, rentA, neto, payM, roi3, roi5 };
}

// ════════════════════════════════════════════════════════════════
// FORMATTERS
// ════════════════════════════════════════════════════════════════
const fmt  = n => new Intl.NumberFormat('es-ES',{style:'currency',currency:'EUR',maximumFractionDigits:0}).format(n);
const fmtN = n => new Intl.NumberFormat('es-ES',{maximumFractionDigits:0}).format(Math.round(n));
const r1   = n => Math.round(n*10)/10;
const escH = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

// ════════════════════════════════════════════════════════════════
// STEPPER
// ════════════════════════════════════════════════════════════════
function renderStepper() {
  const labels = ['Perfil','Variables físicas','Contacto','Tu ROI'];
  document.getElementById('stepper').innerHTML = labels.map((l,i)=>{
    const n=i+1, done=state.step>n, active=state.step===n;
    return `${i>0?`<div class="step-line ${done?'done':''}"></div>`:''}
    <div class="step-item">
      <div class="step-circle ${active?'active':done?'done':''}">${done?'✓':n}</div>
      <span class="step-label ${active?'active':done?'done':''}">${l}</span>
    </div>`;
  }).join('');
  const name = state.hotel.name ? ` — ${state.hotel.name}` : '';
  document.getElementById('hdr-hotel-name').textContent = name;
}

// ════════════════════════════════════════════════════════════════
// STEP 1 — HOTEL PROFILE
// ════════════════════════════════════════════════════════════════
function renderStep1() {
  const h = state.hotel;
  const hotelCards = Object.entries(RENTING).map(([key,rent])=>`
    <div class="hotel-card ${h.type===key?'selected':''}" onclick="setHotelType('${key}')">
      <div style="display:flex;align-items:baseline;gap:8px;margin-bottom:3px">
        <span class="hotel-card-name">Hotel ${key}</span>
        <span style="font-size:12px;color:var(--muted)">${{S:'Pequeño',M:'Mediano',L:'Grande',XL:'Resort XL'}[key]}</span>
      </div>
      <div class="hotel-card-guests">${GUESTS[key]} huéspedes</div>
      <div class="hotel-stat"><span style="color:var(--muted)">Robots pack</span><span class="hotel-stat-v">${ROBOTS[key]} robots</span></div>
      <div class="hotel-stat"><span style="color:var(--muted)">Renting mensual</span><span class="hotel-stat-v">${fmt(rent)}</span></div>
    </div>`).join('');

  const deptCards = DEPTS.map(d=>`
    <div class="dept-card ${state.sel[d.id]?'selected':''}" onclick="toggleDept('${d.id}')">
      <span class="dept-icon">${d.icon}</span>
      <div style="flex:1">
        <div class="dept-name">${d.label}</div>
        <div class="dept-desc">${d.desc}</div>
        <div class="dept-robots">🤖 ${d.robots}</div>
      </div>
      <div class="dept-check">${state.sel[d.id]?'✓':''}</div>
    </div>`).join('');

  const anyDept = Object.values(state.sel).some(Boolean);
  document.getElementById('main').innerHTML = `
    <div class="card">
      <p class="section-label">1A — Datos del hotel</p>
      <div style="margin-bottom:12px">
        <label class="lbl">Nombre del hotel</label>
        <input class="big" type="text" id="inp-name" placeholder="Ej: Hotel Playa Esmeralda" value="${escH(h.name)}">
      </div>
      <div class="g3">
        <div>
          <label class="lbl">Categoría</label>
          <select id="inp-category">
            <option value="urbano" ${h.category==='urbano'?'selected':''}>Hotel Urbano</option>
            <option value="resort" ${h.category==='resort'?'selected':''}>Resort Vacacional</option>
            <option value="boutique" ${h.category==='boutique'?'selected':''}>Boutique</option>
            <option value="congreso" ${h.category==='congreso'?'selected':''}>Congreso / MICE</option>
          </select>
        </div>
        <div>
          <label class="lbl">Estrellas</label>
          <select id="inp-stars">
            <option value="3" ${h.stars===3?'selected':''}>⭐⭐⭐ 3 estrellas</option>
            <option value="4" ${h.stars===4?'selected':''}>⭐⭐⭐⭐ 4 estrellas</option>
            <option value="5" ${h.stars===5?'selected':''}>⭐⭐⭐⭐⭐ 5 estrellas</option>
          </select>
        </div>
        <div>
          <label class="lbl">Ocupación media anual: <strong style="color:var(--cyan)">${h.occupancy}%</strong></label>
          <input type="range" id="inp-occ" min="30" max="100" value="${h.occupancy}">
          <div class="range-labels"><span>30%</span><span>100%</span></div>
        </div>
      </div>
    </div>

    <div class="card">
      <p class="section-label">1B — Tipología por número de huéspedes</p>
      <div class="g2">${hotelCards}</div>
    </div>

    <div class="card">
      <p class="section-label">1C — Departamentos a robotizar</p>
      <div class="g2">${deptCards}</div>
    </div>

    <button class="btn-p" ${anyDept?'':'disabled'} onclick="nextStep()">
      Siguiente → Variables físicas del hotel
    </button>`;

  // Events
  document.getElementById('inp-name').oninput = e => { state.hotel.name = e.target.value; renderStepper(); };
  document.getElementById('inp-category').onchange = e => state.hotel.category = e.target.value;
  document.getElementById('inp-stars').onchange = e => state.hotel.stars = +e.target.value;
  document.getElementById('inp-occ').oninput = e => {
    state.hotel.occupancy = +e.target.value;
    e.target.previousElementSibling.innerHTML = `Ocupación media anual: <strong style="color:var(--cyan)">${e.target.value}%</strong>`;
  };
}

// ════════════════════════════════════════════════════════════════
// STEP 2 — PHYSICAL VARIABLES
// ════════════════════════════════════════════════════════════════
function physPreview(res) {
  return `<div class="phys-preview g4">
    <div class="phys-item"><div class="lv">Horas manual/día</div><div class="vv">${r1(res.manualH)} h</div></div>
    <div class="phys-item"><div class="lv">Horas robot/día</div><div class="vv">${r1(res.robotH)} h</div></div>
    <div class="phys-item"><div class="lv">Horas liberadas/día</div><div class="vv cyan">${r1(res.freedH)} h</div></div>
    <div class="phys-item"><div class="lv">Ahorro anual</div><div class="vv green">${fmt(res.savings)}</div></div>
  </div>`;
}

function renderStep2() {
  const occ = state.hotel.occupancy;
  const { totalSavings, rentA, neto, payM } = computeAll();
  const payColor = payM<18?'var(--green)':payM<30?'var(--orange)':'var(--red)';

  let html = `<div class="card card-cyan" style="margin-bottom:14px">
    <p style="font-size:13px;color:var(--muted);margin:0">🔬 <strong style="color:#fff">Modelo físico real.</strong>
    Los ahorros se calculan desde parámetros físicos medidos: velocidades de robot, capacidades de carga y distancias reales.
    El porcentaje de ahorro NO es fijo — emerge del cálculo de ingeniería de Wiongo.</p>
  </div>`;

  if(state.sel.hk) {
    const res = calcHK(state.P.hk, occ);
    html += `<div class="card" id="card-hk">
      <p class="section-label">🧹 Housekeeping — Robot C40 (900 m²/h autónomo)</p>
      <div class="hint-box"><strong>Fórmula:</strong> Horas manual = superficie ÷ 275 m²/h · Horas robot = superficie ÷ 900 m²/h + 5 min/planta ascensor + 0,5h supervisión
      <br><em>Fuente: Estudio Iberostar 2026 (Wiongo) + Ficha Técnica Modular</em></div>
      <div class="g4">
        <div><label class="lbl">Superficie m² (zonas comunes)</label><input type="number" id="hk-surface" value="${state.P.hk.surface}" min="100" max="20000"></div>
        <div><label class="lbl">Número de plantas</label><input type="number" id="hk-floors" value="${state.P.hk.floors}" min="1" max="20"></div>
        <div><label class="lbl">Limpiezas por día</label><input type="number" id="hk-frequency" value="${state.P.hk.frequency}" min="1" max="3"></div>
        <div><label class="lbl">Coste/hora personal (€)</label><input type="number" id="hk-costH" value="${state.P.hk.costH}" min="10" max="30"></div>
      </div>
      <div id="prev-hk">${physPreview(res)}</div>
    </div>`;
  }

  if(state.sel.fyb) {
    const res = calcFYB(state.P.fyb, occ);
    html += `<div class="card" id="card-fyb">
      <p class="section-label">🍽️ F&amp;B — Robots T9/S100 (0,3–0,4 m/s · 150–200 kg/viaje)</p>
      <div class="hint-box"><strong>Fórmula:</strong> Menaje = aforo × ocupación × 5,8 uds/comensal → Viajes robot (200 uds sucio / 100 limpio) vs manual (50 uds/viaje) × tiempo según distancia
      <br><em>Fuente: 02_CALCULO Playa Esmeralda + 03_SUPUESTOS Wiongo (5,8 menaje/comensal)</em></div>
      <div class="g3" style="margin-bottom:12px">
        <div><label class="lbl">Aforo comensales (plazas)</label><input type="number" id="fyb-covers" value="${state.P.fyb.covers}" min="50" max="3000"></div>
        <div><label class="lbl">Distancia cocina→sala (metros)</label><input type="number" id="fyb-distance" value="${state.P.fyb.distance}" min="5" max="200"></div>
        <div><label class="lbl">Servicios por día</label><input type="number" id="fyb-servicesPerDay" value="${state.P.fyb.servicesPerDay}" min="1" max="4"></div>
        <div>
          <label class="lbl">Tipo de servicio</label>
          <select id="fyb-serviceType">
            <option value="buffet" ${state.P.fyb.serviceType==='buffet'?'selected':''}>Buffet (más idóneo)</option>
            <option value="mixto" ${state.P.fyb.serviceType==='mixto'?'selected':''}>Buffet + Carta</option>
            <option value="roomservice" ${state.P.fyb.serviceType==='roomservice'?'selected':''}>Room Service</option>
            <option value="carta" ${state.P.fyb.serviceType==='carta'?'selected':''}>Solo Carta</option>
          </select>
        </div>
        <div><label class="lbl">Coste/hora personal (€)</label><input type="number" id="fyb-costH" value="${state.P.fyb.costH}" min="10" max="30"></div>
        <div><label class="lbl">Días operación/año</label><input type="number" id="fyb-days" value="${state.P.fyb.days}" min="100" max="365"></div>
      </div>
      <div id="prev-fyb">${physPreview(res)}</div>
    </div>`;
  }

  if(state.sel.eco) {
    const res = calcEco(state.P.eco, occ);
    html += `<div class="card" id="card-eco">
      <p class="section-label">📦 Economato — Robot S300 (300 kg/viaje autónomo)</p>
      <div class="hint-box"><strong>Fórmula:</strong> Viajes robot (agrupando 3 destinos/viaje) vs manual (1 destino, 25 kg/carro) × distancia y velocidad</div>
      <div class="g4">
        <div><label class="lbl">Puntos de entrega</label><input type="number" id="eco-deliveryPoints" value="${state.P.eco.deliveryPoints}" min="2" max="50"></div>
        <div><label class="lbl">Distancia almacén→destino (m)</label><input type="number" id="eco-distance" value="${state.P.eco.distance}" min="10" max="300"></div>
        <div><label class="lbl">Cargas totales/día</label><input type="number" id="eco-loadsPerDay" value="${state.P.eco.loadsPerDay}" min="2" max="50"></div>
        <div><label class="lbl">Coste/hora personal (€)</label><input type="number" id="eco-costH" value="${state.P.eco.costH}" min="10" max="25"></div>
      </div>
      <div id="prev-eco">${physPreview(res)}</div>
    </div>`;
  }

  if(state.sel.fd) {
    const res = calcFD(state.P.fd, occ);
    html += `<div class="card" id="card-fd">
      <p class="section-label">🛎️ Front Desk — Robot W3 (integración ascensor)</p>
      <div class="hint-box"><strong>Fórmula:</strong> Equipaje = check-ins × 1,8 piezas → Viajes robot (8 piezas) vs botones manual (3 piezas) × distancia recepción→ascensor</div>
      <div class="g4">
        <div><label class="lbl">Nº habitaciones</label><input type="number" id="fd-rooms" value="${state.P.fd.rooms}" min="20" max="2000"></div>
        <div><label class="lbl">Check-ins estimados/día</label><input type="number" id="fd-checkinsPerDay" value="${state.P.fd.checkinsPerDay}" min="10" max="500"></div>
        <div><label class="lbl">Distancia recepción→ascensor (m)</label><input type="number" id="fd-distance" value="${state.P.fd.distance}" min="5" max="200"></div>
        <div><label class="lbl">Coste/hora personal (€)</label><input type="number" id="fd-costH" value="${state.P.fd.costH}" min="10" max="25"></div>
      </div>
      <div id="prev-fd">${physPreview(res)}</div>
    </div>`;
  }

  // Live preview
  html += `<div class="live-preview g4" id="live-preview">
    <div class="live-item"><div class="ll">Ahorro bruto/año</div><div class="lv" style="color:var(--cyan)" id="lp-sav">${fmt(totalSavings)}</div></div>
    <div class="live-item"><div class="ll">Coste renting/año</div><div class="lv" style="color:var(--orange)">${fmt(rentA)}</div></div>
    <div class="live-item"><div class="ll">Resultado neto/año</div><div class="lv" style="color:${neto>0?'var(--green)':'var(--red)'}" id="lp-net">${fmt(neto)}</div></div>
    <div class="live-item"><div class="ll">Payback estimado</div><div class="lv" style="color:${payColor}" id="lp-pay">${Math.round(payM)} meses</div></div>
  </div>

  <div class="btn-row">
    <button class="btn-s" onclick="prevStep()">← Volver</button>
    <button class="btn-p" onclick="nextStep()">Siguiente → Datos de contacto</button>
  </div>`;

  document.getElementById('main').innerHTML = html;
  attachPhysicsListeners();
}

function attachPhysicsListeners() {
  const occ = state.hotel.occupancy;
  const depts2 = ['hk','fyb','eco','fd'];
  depts2.forEach(dept => {
    if(!state.sel[dept]) return;
    const fields = Object.keys(state.P[dept]);
    fields.forEach(field => {
      const el = document.getElementById(`${dept}-${field}`);
      if(!el) return;
      el.oninput = el.onchange = () => {
        state.P[dept][field] = isNaN(+el.value) ? el.value : +el.value;
        // Update preview
        const res = dept==='hk' ? calcHK(state.P.hk, occ)
                  : dept==='fyb'? calcFYB(state.P.fyb, occ)
                  : dept==='eco'? calcEco(state.P.eco, occ)
                  : calcFD(state.P.fd, occ);
        const prevEl = document.getElementById(`prev-${dept}`);
        if(prevEl) prevEl.innerHTML = physPreview(res);
        updateLivePreview();
      };
    });
  });
}

function updateLivePreview() {
  const { totalSavings, neto, payM } = computeAll();
  const payColor = payM<18?'var(--green)':payM<30?'var(--orange)':'var(--red)';
  const s = document.getElementById('lp-sav');
  const n = document.getElementById('lp-net');
  const p = document.getElementById('lp-pay');
  if(s) s.textContent = fmt(totalSavings);
  if(n) { n.textContent = fmt(neto); n.style.color = neto>0?'var(--green)':'var(--red)'; }
  if(p) { p.textContent = Math.round(payM)+' meses'; p.style.color = payColor; }
}

// ════════════════════════════════════════════════════════════════
// STEP 3 — LEAD CAPTURE
// ════════════════════════════════════════════════════════════════
function renderStep3() {
  document.getElementById('main').innerHTML = `
    <div class="card">
      <p class="section-label">3 — Datos de contacto</p>

    <!-- FINANCIERO DETALLE -->
    <div class="card">

      <div class="summary-row"><span style="color:var(--muted)">Ahorro operativo mensual</span><span style="font-weight:700;color:var(--green)">${fmt(totalSavings/12)}</span></div>

    state.chart = new Chart(ctx, {
      type:'line',
      data:{
        labels: chartData.map(d=>d.y),
        datasets:[
          { label:'Ahorro acumulado', data:chartData.map(d=>d.sav),
            borderColor:'#22C55E', backgroundColor:'rgba(34,197,94,0.12)',

function animateNum(id, target, prefix='', suffix='') {
  const el = document.getElementById(id);
  if(!el) return;
  let cur=0; const step=target/45; const isNeg=target<0; const abs=Math.abs(target);
  const t=setInterval(()=>{
    cur+=Math.abs(step);
    if(cur>=abs){ el.textContent=prefix+(isNeg?'-':'')+fmtN(abs)+suffix; clearInterval(t); }
    else el.textContent=prefix+(isNeg?'-':'')+fmtN(cur)+suffix;
  },18);
}

// ════════════════════════════════════════════════════════════════
// NAVIGATION & HELPERS
// ════════════════════════════════════════════════════════════════
function setHotelType(t){ state.hotel.type=t; renderStep1(); }
function toggleDept(id){ state.sel[id]=!state.sel[id]; renderStep1(); }
function toggleConsent(){
  state.lead.consent=!state.lead.consent;
  const b=document.getElementById('consent-box');
  if(b){b.classList.toggle('checked',state.lead.consent);b.textContent=state.lead.consent?'✓':'';}
}
function nextStep(){ state.step=Math.min(4,state.step+1); render(); }
function prevStep(){ state.step=Math.max(1,state.step-1); render(); }
function restart(){ state.step=1; render(); }

function submitLead(){
  const err=document.getElementById('lead-error');
  if(!state.lead.name||!state.lead.email){if(err)err.textContent='⚠️ Nombre y email son obligatorios.';return;}
  if(!state.lead.consent){if(err)err.textContent='⚠️ Debes aceptar el tratamiento de datos.';return;}
  nextStep();
}

function requestVisit(){
  const subj = encodeURIComponent(`ROI Wiongo — ${state.hotel.name||'Hotel'}`);
  const body = encodeURIComponent(`Hola,\n\nSoy ${state.lead.name||'[nombre]'} y acabo de calcular el ROI con la calculadora de Wiongo.\nMe gustaría recibir una visita técnica personalizada.\n\nSaludos`);
  window.open(`mailto:info@wiongo.com?subject=${subj}&body=${body}`,'_blank');
}

// ════════════════════════════════════════════════════════════════
// MAIN RENDER
// ════════════════════════════════════════════════════════════════
function render(){
  renderStepper();
  window.scrollTo({top:0,behavior:'smooth'});
  if(state.step===1) renderStep1();
  else if(state.step===2) renderStep2();
  else if(state.step===3) renderStep3();
  else if(state.step===4) renderStep4();
}

// BOOT
render();
</script>
